<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My Tasks — IELTS Platform</title>
  <script src="/js/core/theme.js"></script>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/pages/tasks.css"/>
</head>
<body>
<div class="page-wrap">

  <!-- HERO -->
  <div class="tasks-hero">
    <span class="hero-deco-text" aria-hidden="true">Tasks</span>
    <div class="hero-content">
      <p class="hero-eyebrow">Writing Practice</p>
      <h1 class="hero-title">My <em>Tasks</em></h1>
      <p class="hero-sub">All your IELTS writing tasks in one place — track progress, review feedback, and keep improving.</p>
    </div>
    <div class="hero-cta">
      <a href="/pages/tasks/create.html" class="btn-new">
        <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/>
        </svg>
        New Task
      </a>
    </div>
  </div>

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8">
        <circle cx="9" cy="9" r="6"/>
        <path d="m15 15 3 3" stroke-linecap="round"/>
      </svg>
      <input type="text" id="search-input" placeholder="Search tasks…"/>
    </div>

    <div class="toolbar-divider"></div>

    <div class="filter-pills">
      <div class="filter-pill-wrap">
        <select id="filter-status">
          <option value="">All Statuses</option>
          <option value="ASSIGNED">Assigned</option>
          <option value="WRITING">Writing</option>
          <option value="SUBMITTED">Submitted</option>
          <option value="REVIEWED">Reviewed</option>
          <option value="SCORED">Scored</option>
        </select>
      </div>
      <div class="filter-pill-wrap">
        <select id="filter-type">
          <option value="">All Types</option>
          <option value="TASK_1">Task 1</option>
          <option value="TASK_2">Task 2</option>
        </select>
      </div>
      <div class="filter-pill-wrap">
        <select id="filter-exam">
          <option value="">All Exams</option>
          <option value="ACADEMIC">Academic</option>
          <option value="GENERAL">General</option>
        </select>
      </div>
    </div>

    <span class="tasks-count" id="tasks-count"></span>
  </div>

  <!-- TASKS GRID — populated by list.js -->
  <div id="tasks-list" class="tasks-grid">
    <p class="loading">Loading tasks…</p>
  </div>

</div>

<script src="/js/pages/tasks/task.filtercount.js"></script>
<script type="module" src="/js/pages/tasks/list.js"></script>
</body>
</html>
