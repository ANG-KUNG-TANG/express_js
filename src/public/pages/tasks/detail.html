<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Task Detail — IELTS Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --ink:      #0b1120;
      --ink-2:    #1a2640;
      --frost:    #f5f3ef;
      --gold:     #c9a84c;
      --blue:     #4d7cfe;
      --blue-bg:  #eef2ff;
      --green:    #16a34a;
      --amber:    #d97706;
      --amber-bg: #fffbeb;
      --muted:    #6b7a96;
      --border:   #e8edf5;
    }

    body { font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; background: var(--frost); }

    .detail-page { max-width: 1200px; margin: 0 auto; padding: 28px 28px 72px; }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: .82rem; font-weight: 500; color: var(--muted); text-decoration: none;
      margin-bottom: 24px; transition: color .14s, gap .14s;
    }
    .back-link:hover { color: var(--ink); gap: 10px; }
    .back-link svg { width: 14px; height: 14px; flex-shrink: 0; }

    /* ── TASK HEADER ── */
    .task-header {
      background: var(--ink); border-radius: 18px; padding: 36px 44px; margin-bottom: 24px;
      position: relative; overflow: hidden;
      display: flex; align-items: flex-start; justify-content: space-between; gap: 24px;
      animation: fadeUp .4s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }
    .task-header::before {
      content:''; position:absolute; inset:0;
      background-image: radial-gradient(circle, rgba(255,255,255,.055) 1px, transparent 1px);
      background-size: 26px 26px; pointer-events:none;
    }
    .task-header::after {
      content:''; position:absolute; top:-60px; right:-60px; width:280px; height:280px;
      background: radial-gradient(circle, rgba(77,124,254,.18) 0%, transparent 65%); pointer-events:none;
    }
    .task-header-left { position:relative; z-index:2; flex:1; min-width:0; }
    .task-header-eyebrow {
      font-size:.68rem; font-weight:600; letter-spacing:.15em; text-transform:uppercase;
      color:var(--gold); margin-bottom:10px; display:flex; align-items:center; gap:9px;
    }
    .task-header-eyebrow::before { content:''; width:18px; height:1px; background:var(--gold); opacity:.55; }
    .task-title { font-family:'Playfair Display',serif; font-size:1.9rem; font-weight:700; line-height:1.2; color:#f0ece3; letter-spacing:-.02em; margin:0 0 16px; }
    .task-meta { display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .tag { display:inline-flex; align-items:center; padding:4px 12px; border-radius:99px; font-size:.7rem; font-weight:700; letter-spacing:.04em; text-transform:uppercase; }
    .tag--type { background:rgba(77,124,254,.2); color:#93b4fd; border:1px solid rgba(77,124,254,.25); }
    .tag--exam { background:rgba(255,255,255,.08); color:#8a9ab8; border:1px solid rgba(255,255,255,.1); }
    .task-header-right { position:relative; z-index:2; flex-shrink:0; }
    .status-badge { display:inline-flex; align-items:center; gap:6px; padding:6px 14px; border-radius:99px; font-size:.72rem; font-weight:700; letter-spacing:.05em; text-transform:uppercase; }
    .status-badge::before { content:''; width:6px; height:6px; border-radius:50%; background:currentColor; opacity:.75; flex-shrink:0; }
    .status--ASSIGNED  { background:rgba(148,163,184,.15); color:#94a3b8; border:1px solid rgba(148,163,184,.25); }
    .status--WRITING   { background:rgba(77,124,254,.2);   color:#93b4fd; border:1px solid rgba(77,124,254,.3);   }
    .status--SUBMITTED { background:rgba(217,119,6,.2);    color:#fbbf24; border:1px solid rgba(217,119,6,.3);    }
    .status--REVIEWED  { background:rgba(124,58,237,.2);   color:#c4b5fd; border:1px solid rgba(124,58,237,.3);  }
    .status--SCORED    { background:rgba(22,163,74,.2);    color:#86efac; border:1px solid rgba(22,163,74,.3);   }

    /* ── 3-COLUMN TOP ROW: Prompt | Notes | Sidebar ── */
    .detail-top-row {
      display: grid;
      grid-template-columns: 1fr 1fr 280px;
      gap: 20px;
      align-items: start;
      margin-bottom: 20px;
    }
    @media (max-width: 980px) {
      .detail-top-row { grid-template-columns: 1fr 1fr; }
      .detail-top-row .sidebar-col { grid-column: 1 / -1; }
    }
    @media (max-width: 600px) {
      .detail-top-row { grid-template-columns: 1fr; }
      .detail-page { padding: 16px 16px 56px; }
      .task-header { padding: 26px 22px; flex-direction: column; gap: 16px; border-radius: 14px; }
      .task-title  { font-size: 1.5rem; }
    }

    /* ── CARDS ── */
    .detail-card {
      background:#fff; border:1.5px solid var(--border); border-radius:14px; overflow:hidden;
      animation: fadeUp .4s cubic-bezier(.16,1,.3,1) both; animation-delay:.08s;
    }
    .detail-bottom-col .detail-card { margin-bottom: 18px; }
    .detail-card__head {
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 22px; border-bottom:1px solid var(--border); background:#fafbfd;
    }
    .detail-card__label {
      font-size:.7rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em;
      color:var(--muted); display:flex; align-items:center; gap:8px;
    }
    .detail-card__label svg { width:13px; height:13px; color:#a0adc0; }
    .detail-card__content { padding:22px; font-size:.925rem; line-height:1.75; color:#374151; white-space:pre-wrap; }

    #task-wordcount {
      font-size:.7rem; font-weight:700; padding:2px 9px;
      background:var(--blue-bg); color:var(--blue);
      border-radius:99px; border:1px solid #c5d3fd; letter-spacing:.03em;
    }

    .notes-edit-area {
      width:100%; font-family:'DM Sans',sans-serif; font-size:.925rem; line-height:1.7;
      padding:16px 22px; border:none; border-top:2px solid var(--blue);
      background:#fff; resize:vertical; outline:none; color:#374151; min-height:120px;
    }
    .edit-actions { display:flex; gap:8px; padding:12px 22px; border-top:1px solid var(--border); background:#fafbfd; }
    .btn-sm { padding:6px 14px; border-radius:7px; font-family:'DM Sans',sans-serif; font-size:.8rem; font-weight:600; cursor:pointer; border:none; transition:background .13s; }
    .btn-sm--primary { background:var(--ink); color:#fff; }
    .btn-sm--primary:hover { background:var(--ink-2); }
    .btn-sm--ghost { background:transparent; color:var(--muted); border:1.5px solid var(--border); }
    .btn-sm--ghost:hover { background:var(--frost); color:var(--ink); }
    #edit-notes-btn {
      padding:4px 11px; border:1.5px solid var(--border); border-radius:7px; background:transparent;
      font-family:'DM Sans',sans-serif; font-size:.72rem; font-weight:600; color:var(--muted); cursor:pointer;
      transition:background .13s,color .13s; display:flex; align-items:center; gap:5px;
    }
    #edit-notes-btn:hover { background:var(--blue-bg); color:var(--blue); border-color:#c5d3fd; }
    #edit-notes-btn svg { width:11px; height:11px; }

    /* ── SIDEBAR ── */
    .sidebar-col { display:flex; flex-direction:column; }
    .sidebar-card {
      background:#fff; border:1.5px solid var(--border); border-radius:14px; overflow:hidden;
      position:sticky; top:calc(var(--nav-h,64px) + 20px);
      animation:fadeUp .4s cubic-bezier(.16,1,.3,1) both; animation-delay:.12s;
    }
    .sidebar-card__head {
      padding:14px 20px; border-bottom:1px solid var(--border); background:#fafbfd;
      font-size:.72rem; font-weight:700; text-transform:uppercase; letter-spacing:.09em; color:var(--muted);
    }

    #score-section { border-bottom:1px solid var(--border); }
    .score-display {
      background:linear-gradient(135deg,#f0fdf4 0%,#dcfce7 100%);
      border:1.5px solid #bbf7d0; border-radius:12px;
      padding:18px 16px; text-align:center; margin:16px 20px;
    }
    .score-number { font-family:'Playfair Display',serif; font-size:3.2rem; font-weight:700; color:var(--green); line-height:1; display:block; margin-bottom:4px; }
    .score-label  { font-size:.65rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; color:var(--green); opacity:.75; }

    .meta-rows { padding:4px 0; }
    .meta-row { display:flex; justify-content:space-between; align-items:center; padding:10px 20px; border-bottom:1px solid #f4f6fb; font-size:.85rem; }
    .meta-row:last-child { border-bottom:none; }
    .meta-row__label { color:var(--muted); font-weight:400; }
    .meta-row__value { font-weight:600; color:var(--ink); }

    #task-actions { display:flex; flex-direction:column; gap:8px; padding:16px 20px; border-top:1px solid var(--border); }
    #task-actions .btn, #task-actions button {
      width:100%; padding:11px 16px; border-radius:9px; font-family:'DM Sans',sans-serif;
      font-size:.875rem; font-weight:600; cursor:pointer; border:none;
      transition:background .14s,box-shadow .14s; text-align:center; text-decoration:none; display:block;
    }
    #task-actions .btn--primary { background:var(--ink); color:#fff; }
    #task-actions .btn--primary:hover { background:var(--ink-2); box-shadow:0 4px 14px rgba(11,17,32,.18); }
    #task-actions .btn--secondary { background:transparent; color:var(--ink); border:1.5px solid var(--border) !important; }
    #task-actions .btn--secondary:hover { background:var(--frost); }

    .task-extra-actions { padding:14px 20px; border-top:1px solid var(--border); display:flex; flex-direction:column; gap:8px; }
    #transfer-task-btn {
      width:100%; padding:11px 16px; border-radius:9px; font-family:'DM Sans',sans-serif;
      font-size:.875rem; font-weight:600; cursor:pointer;
      background:var(--amber-bg); color:var(--amber); border:1.5px solid #fde68a;
      display:flex; align-items:center; justify-content:center; gap:8px;
      transition:background .14s,box-shadow .14s;
    }
    #transfer-task-btn:hover { background:#fef3c7; box-shadow:0 2px 10px rgba(217,119,6,.15); }
    #transfer-task-btn svg { width:14px; height:14px; flex-shrink:0; }

    /* ── SUBMISSION + QR ROW ── */
    #submission-qr-row {
      display: grid;
      grid-template-columns: 1fr 260px;
      gap: 20px;
      align-items: start;
      margin-bottom: 20px;
    }
    @media (max-width: 700px) {
      #submission-qr-row { grid-template-columns: 1fr; }
    }

    /* QR card body (standalone card, not sidebar) */
    .qr-card__body {
      padding: 24px 20px;
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    .qr-canvas-wrap {
      background: #fff; border: 1.5px solid var(--border); border-radius: 10px;
      padding: 10px; display: inline-flex; box-shadow: 0 2px 10px rgba(11,17,32,.06);
    }
    #qr-canvas { display: block; }
    .qr-hint { font-size: .76rem; color: var(--muted); text-align: center; line-height: 1.5; }
    .qr-actions { display: flex; gap: 8px; width: 100%; }
    .btn-qr {
      flex: 1; padding: 9px 12px; border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: .82rem; font-weight: 600;
      cursor: pointer; border: none; transition: background .13s, box-shadow .13s;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn-qr--primary { background: var(--ink); color: #fff; }
    .btn-qr--primary:hover { background: var(--ink-2); box-shadow: 0 4px 14px rgba(11,17,32,.18); }
    .btn-qr svg { width: 12px; height: 12px; flex-shrink: 0; }

    /* ── BOTTOM FULL-WIDTH ── */
    .detail-bottom-col { display:flex; flex-direction:column; }

    /* ── TRANSFER MODAL ── */
    .transfer-modal-backdrop {
      position:fixed; inset:0; background:rgba(11,17,32,.45); backdrop-filter:blur(3px);
      z-index:500; display:flex; align-items:center; justify-content:center;
      animation:backdropIn .18s ease both;
    }
    @keyframes backdropIn { from{opacity:0;} to{opacity:1;} }
    .transfer-modal {
      background:#fff; border-radius:16px; padding:32px 28px; width:100%; max-width:400px; margin:20px;
      box-shadow:0 20px 60px rgba(11,17,32,.25); animation:modalIn .22s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes modalIn { from{opacity:0;transform:translateY(16px) scale(.97);} to{opacity:1;transform:translateY(0) scale(1);} }
    .transfer-modal h3 { font-family:'Playfair Display',serif; font-size:1.2rem; font-weight:700; color:var(--ink); margin:0 0 8px; }
    .transfer-modal p { font-size:.875rem; color:var(--muted); line-height:1.6; margin-bottom:20px; }
    .transfer-modal label { display:block; font-size:.72rem; font-weight:600; letter-spacing:.07em; text-transform:uppercase; color:#4e5a70; margin-bottom:7px; }
    .transfer-modal input { width:100%; padding:11px 14px; border:1.5px solid #dde2ec; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:.9rem; color:var(--ink); background:#fafbfd; outline:none; margin-bottom:6px; transition:border-color .14s,box-shadow .14s; }
    .transfer-modal input:focus { border-color:var(--blue); background:#fff; box-shadow:0 0 0 3px rgba(77,124,254,.1); }
    .transfer-modal-hint { font-size:.74rem; color:#9aacc8; margin-bottom:20px; }
    .transfer-modal-actions { display:flex; gap:10px; }
    .transfer-modal-actions button { flex:1; padding:11px; border-radius:9px; font-family:'DM Sans',sans-serif; font-size:.875rem; font-weight:600; cursor:pointer; border:none; transition:background .13s; }
    #transfer-confirm-btn { background:var(--ink); color:#fff; }
    #transfer-confirm-btn:hover { background:var(--ink-2); }
    #transfer-confirm-btn:disabled { opacity:.5; cursor:not-allowed; }
    #transfer-cancel-btn { background:var(--frost); color:var(--muted); border:1.5px solid var(--border) !important; }
    #transfer-cancel-btn:hover { background:#ede9e3; }
    .transfer-error { font-size:.75rem; color:#dc2626; margin-bottom:14px; min-height:14px; }
  </style>
</head>
<body class="page">
<div class="detail-page">

  <a href="/pages/tasks/list.html" class="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
    My Tasks
  </a>

  <div id="task-container">

    <!-- Task Header -->
    <div class="task-header">
      <div class="task-header-left">
        <p class="task-header-eyebrow">Task Detail</p>
        <h1 class="task-title" id="task-title">Loading…</h1>
        <div class="task-meta">
          <span class="tag tag--type" id="task-type">—</span>
          <span class="tag tag--exam" id="task-exam">—</span>
        </div>
      </div>
      <div class="task-header-right"><div id="task-status"></div></div>
    </div>

    <!-- Assignment banner — shown for teacher-assigned tasks -->
    <div id="assignment-banner" style="display:none;align-items:center;gap:10px;
         padding:12px 18px;margin-bottom:16px;
         background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);
         border-radius:10px;font-size:13px;color:var(--muted)">
    </div>

    <!-- 3-col top row: Question Prompt | Notes | Task Info -->
    <div class="detail-top-row">

      <!-- Col 1: Question Prompt -->
      <div class="detail-card">
        <div class="detail-card__head">
          <div class="detail-card__label">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 3h12M2 6h9M2 9h10M2 12h7" stroke-linecap="round"/></svg>
            Question Prompt
          </div>
        </div>
        <div class="detail-card__content" id="task-prompt">—</div>
      </div>

      <!-- Col 2: Notes -->
      <div class="detail-card" id="notes-section">
        <div class="detail-card__head">
          <div class="detail-card__label">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 5h6M5 8h6M5 11h4" stroke-linecap="round"/></svg>
            Notes
          </div>
          <button id="edit-notes-btn">
            <svg viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M9.5 1.5l3 3L4 13H1v-3L9.5 1.5z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Edit
          </button>
        </div>
        <div class="detail-card__content" id="task-description">—</div>
      </div>

      <!-- Col 3: Task Info sidebar -->
      <aside class="sidebar-col">
        <div class="sidebar-card">

          <div id="score-section" style="display:none;">
            <div class="score-display">
              <span class="score-number" id="task-score">—</span>
              <div class="score-label">Band Score</div>
            </div>
          </div>

          <div class="sidebar-card__head">Task Info</div>
          <div class="meta-rows">
            <div class="meta-row">
              <span class="meta-row__label">Submitted</span>
              <span class="meta-row__value" id="task-submitted-at">—</span>
            </div>
            <div class="meta-row">
              <span class="meta-row__label">Reviewed</span>
              <span class="meta-row__value" id="task-reviewed-at">—</span>
            </div>
          </div>

          <div id="task-actions"></div>

          <div class="task-extra-actions">
            <button id="transfer-task-btn">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M1 6h10M8 3l3 3-3 3M15 10H5M8 7l-3 3 3 3"/></svg>
              Transfer Task
            </button>
          </div>

        </div>
      </aside>

    </div><!-- /detail-top-row -->

    <!-- Submission + QR side by side (hidden until submitted) -->
    <div id="submission-qr-row" style="display:none;">
      <div class="detail-card" id="submission-section">
        <div class="detail-card__head">
          <div class="detail-card__label">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 13V5l5-3 5 3v8H3z" stroke-linecap="round" stroke-linejoin="round"/><path d="M6 13V9h4v4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Submission
          </div>
          <span id="task-wordcount"></span>
        </div>
        <div class="detail-card__content" id="task-submission"></div>
      </div>

      <div class="detail-card" id="qr-section">
        <div class="detail-card__head">
          <div class="detail-card__label">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
              <rect x="1" y="1" width="6" height="6" rx="1.2"/>
              <rect x="9" y="1" width="6" height="6" rx="1.2"/>
              <rect x="1" y="9" width="6" height="6" rx="1.2"/>
              <rect x="10" y="10" width="2.5" height="2.5"/>
              <rect x="13" y="10" width="2" height="2.5"/>
              <rect x="10" y="13" width="2.5" height="2"/>
              <rect x="13" y="13" width="2" height="2"/>
            </svg>
            QR Code
          </div>
        </div>
        <div class="qr-card__body">
          <div class="qr-canvas-wrap">
            <canvas id="qr-canvas"></canvas>
          </div>
          <p class="qr-hint">Scan to download your submitted text as a file.</p>
          <div class="qr-actions">
            <button class="btn-qr btn-qr--primary" id="qr-download-btn">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M8 2v9M5 8l3 3 3-3M2 13h12"/></svg>
              Download Text
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Full-width bottom: Feedback -->
    <div class="detail-bottom-col">

      <div class="detail-card" id="feedback-section" style="display:none;">
        <div class="detail-card__head">
          <div class="detail-card__label">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M14 10a2 2 0 01-2 2H4l-3 3V4a2 2 0 012-2h9a2 2 0 012 2v6z" stroke-linecap="round" stroke-linejoin="round"/></svg>
            Feedback
          </div>
        </div>
        <div class="detail-card__content" id="task-feedback"></div>
      </div>

    </div>

  </div>
</div>

<div id="transfer-modal-root"></div>

<script type="module" src="/js/pages/tasks/detail.js"></script>

<!-- Transfer modal -->
<script>
(function () {
  const getTaskId = () => new URLSearchParams(window.location.search).get('id');
  const getToken  = () => localStorage.getItem('token') || sessionStorage.getItem('token') || '';
  const root      = document.getElementById('transfer-modal-root');
  const buildModal = () => {
    root.innerHTML = `
      <div class="transfer-modal-backdrop" id="transferBackdrop">
        <div class="transfer-modal" role="dialog" aria-modal="true" aria-label="Transfer task">
          <h3>Transfer Task</h3>
          <p>Reassign this task to another user. This action is logged and cannot be undone.</p>
          <label for="transfer-user-id">Target User ID</label>
          <input type="text" id="transfer-user-id" placeholder="usr_xxxxxxxxxxxxxxxx" autocomplete="off" spellcheck="false" />
          <p class="transfer-modal-hint">Find a user's ID from the Admin → Users panel.</p>
          <p class="transfer-error" id="transfer-err"></p>
          <div class="transfer-modal-actions">
            <button id="transfer-cancel-btn">Cancel</button>
            <button id="transfer-confirm-btn">Confirm Transfer</button>
          </div>
        </div>
      </div>`;
    document.getElementById('transferBackdrop').addEventListener('click', e => { if (e.target.id === 'transferBackdrop') closeModal(); });
    document.getElementById('transfer-cancel-btn').addEventListener('click', closeModal);
    document.getElementById('transfer-confirm-btn').addEventListener('click', doTransfer);
    document.getElementById('transfer-user-id').focus();
  };
  const closeModal = () => { root.innerHTML = ''; };
  const doTransfer = async () => {
    const taskId = getTaskId(), targetUserId = document.getElementById('transfer-user-id')?.value?.trim();
    const errEl = document.getElementById('transfer-err'), btn = document.getElementById('transfer-confirm-btn');
    if (!targetUserId) { errEl.textContent = 'Please enter a target user ID.'; return; }
    if (!taskId)       { errEl.textContent = 'Could not determine task ID from URL.'; return; }
    btn.disabled = true; btn.textContent = 'Transferring…'; errEl.textContent = '';
    try {
      const res  = await fetch(`/api/tasks/${taskId}/transfer`, { method:'PATCH', headers:{'Content-Type':'application/json','Authorization':`Bearer ${getToken()}`}, body:JSON.stringify({ targetUserId }) });
      const json = await res.json().catch(() => ({}));
      if (!res.ok) { errEl.textContent = json.message || `Error ${res.status}`; btn.disabled = false; btn.textContent = 'Confirm Transfer'; return; }
      closeModal(); window.location.href = '/pages/tasks/list.html';
    } catch { errEl.textContent = 'Network error.'; btn.disabled = false; btn.textContent = 'Confirm Transfer'; }
  };
  document.getElementById('transfer-task-btn')?.addEventListener('click', buildModal);
  document.addEventListener('keydown', e => { if (e.key === 'Escape' && root.innerHTML) closeModal(); });
})();
</script>

<!-- QR Code — 100% browser-side, no library, no API, no extra files needed -->
<script>
(function () {
  // ── Tiny self-contained QR generator (Nayuki QR Code Generator, MIT) ────
  // Full spec-compliant implementation embedded here so no CDN or module needed.

  function makeQR(text) {
    const seg  = makeByteSegment(toUtf8Bytes(text));
    const ecl  = { ordinal:1, formatBits:0 }; // MEDIUM
    return encodeSegments([seg], ecl);
  }

  function toUtf8Bytes(str) {
    const bytes = [];
    for (let i = 0; i < str.length; i++) {
      let cp = str.codePointAt(i);
      if (cp > 0xFFFF) i++;
      if      (cp < 0x80)    { bytes.push(cp); }
      else if (cp < 0x800)   { bytes.push(0xC0|(cp>>6), 0x80|(cp&0x3F)); }
      else if (cp < 0x10000) { bytes.push(0xE0|(cp>>12), 0x80|((cp>>6)&0x3F), 0x80|(cp&0x3F)); }
      else                   { bytes.push(0xF0|(cp>>18), 0x80|((cp>>12)&0x3F), 0x80|((cp>>6)&0x3F), 0x80|(cp&0x3F)); }
    }
    return bytes;
  }

  function makeByteSegment(data) {
    const bits = [];
    for (const b of data) appendBits(bits, b, 8);
    return { modeBits:4, numChars:data.length, charCountBits:[8,16,16], bitData:bits };
  }

  function appendBits(arr, val, len) { for (let i=len-1;i>=0;i--) arr.push((val>>>i)&1); }
  function getBit(x,i) { return ((x>>>i)&1)!==0; }

  const ECC_CODEWORDS = [
    [-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
    [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
    [-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
    [-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
  ];
  const NUM_BLOCKS = [
    [-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25],
    [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49],
    [-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68],
    [-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81],
  ];

  function getNumRawDataModules(v) {
    let r=(16*v+128)*v+64;
    if(v>=2){const n=Math.floor(v/7)+2;r-=(25*n-10)*n-55;if(v>=7)r-=36;}
    return r;
  }
  function getNumDataCodewords(v,ecl) {
    return Math.floor(getNumRawDataModules(v)/8) - ECC_CODEWORDS[ecl.ordinal][v]*NUM_BLOCKS[ecl.ordinal][v];
  }
  function numCharCountBits(seg,ver) { return seg.charCountBits[Math.floor((ver+7)/17)]; }
  function totalBits(segs,ver) {
    let r=0;
    for(const s of segs){const c=numCharCountBits(s,ver);if(s.numChars>=1<<c)return Infinity;r+=4+c+s.bitData.length;}
    return r;
  }

  function rsDiv(degree) {
    const r=new Array(degree).fill(0);r[degree-1]=1;let root=1;
    for(let i=0;i<degree;i++){for(let j=0;j<r.length;j++){r[j]=rsMul(r[j],root);if(j+1<r.length)r[j]^=r[j+1];}root=rsMul(root,2);}
    return r;
  }
  function rsRem(data,div) {
    const r=new Array(div.length).fill(0);
    for(const b of data){const f=b^r.shift();r.push(0);div.forEach((c,i)=>{r[i]^=rsMul(c,f);});}
    return r;
  }
  function rsMul(x,y){let z=0;for(let i=7;i>=0;i--){z=z<<1^(z>>>7)*0x11D;z^=(y>>>i&1)*x;}return z;}

  function encodeSegments(segs,ecl) {
    let ver,used;
    for(ver=1;;ver++){
      const cap=getNumDataCodewords(ver,ecl)*8;
      used=totalBits(segs,ver);
      if(used<=cap)break;
      if(ver>=40)throw new Error('Data too long');
    }
    const bb=[];
    for(const s of segs){
      appendBits(bb,s.modeBits,4);
      appendBits(bb,s.numChars,numCharCountBits(s,ver));
      for(const b of s.bitData)bb.push(b);
    }
    const cap=getNumDataCodewords(ver,ecl)*8;
    appendBits(bb,0,Math.min(4,cap-bb.length));
    appendBits(bb,0,(8-bb.length%8)%8);
    for(let p=0xEC;bb.length<cap;p^=0xEC^0x11)appendBits(bb,p,8);
    const dw=new Array(bb.length/8).fill(0);
    bb.forEach((b,i)=>{dw[i>>>3]|=b<<(7-(i&7));});
    return buildMatrix(ver,ecl,dw);
  }

  function buildMatrix(ver,ecl,data) {
    const nb=NUM_BLOCKS[ecl.ordinal][ver],ecc=ECC_CODEWORDS[ecl.ordinal][ver];
    const raw=Math.floor(getNumRawDataModules(ver)/8);
    const nsb=nb-raw%nb,sbl=Math.floor(raw/nb);
    const blocks=[],rdiv=rsDiv(ecc);
    for(let i=0,k=0;i<nb;i++){
      const d=data.slice(k,k+sbl-ecc+(i<nsb?0:1));k+=d.length;
      const e=rsRem(d,rdiv);
      if(i<nsb)d.push(0);
      blocks.push(d.concat(e));
    }
    const result=[];
    for(let i=0;i<blocks[0].length;i++)
      blocks.forEach((b,j)=>{if(i!==sbl-ecc||j>=nsb)result.push(b[i]);});

    const size=ver*4+17;
    const mods=Array.from({length:size},()=>new Array(size).fill(false));
    const isFn=Array.from({length:size},()=>new Array(size).fill(false));

    function setFn(x,y,on){mods[y][x]=on;isFn[y][x]=true;}
    function drawFinder(x,y){
      for(let dy=-4;dy<=4;dy++)for(let dx=-4;dx<=4;dx++){
        const d=Math.max(Math.abs(dx),Math.abs(dy)),xx=x+dx,yy=y+dy;
        if(xx>=0&&xx<size&&yy>=0&&yy<size)setFn(xx,yy,d!==2&&d!==4);
      }
    }
    function drawAlign(x,y){
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++)setFn(x+dx,y+dy,Math.max(Math.abs(dx),Math.abs(dy))!==1);
    }

    // Timing
    for(let i=0;i<size;i++){setFn(6,i,i%2===0);setFn(i,6,i%2===0);}
    // Finders
    drawFinder(3,3);drawFinder(size-4,3);drawFinder(3,size-4);
    // Alignment
    const ap=ver===1?[]:(()=>{
      const n=Math.floor(ver/7)+2;
      const step=ver===32?26:Math.ceil((ver*4+4)/(n*2-2))*2;
      const res=[6];for(let p=size-7;res.length<n;p-=step)res.splice(1,0,p);return res;
    })();
    for(let i=0;i<ap.length;i++)for(let j=0;j<ap.length;j++)
      if(!((i===0&&j===0)||(i===0&&j===ap.length-1)||(i===ap.length-1&&j===0)))drawAlign(ap[i],ap[j]);

    // Format bits (placeholder)
    function drawFormat(mask){
      const d=ecl.formatBits<<3|mask;let rem=d;
      for(let i=0;i<10;i++)rem=rem<<1^(rem>>>9)*0x537;
      const bits=(d<<10|rem)^0x5412;
      for(let i=0;i<=5;i++)setFn(8,i,getBit(bits,i));
      setFn(8,7,getBit(bits,6));setFn(8,8,getBit(bits,7));setFn(7,8,getBit(bits,8));
      for(let i=9;i<15;i++)setFn(14-i,8,getBit(bits,i));
      for(let i=0;i<8;i++)setFn(size-1-i,8,getBit(bits,i));
      for(let i=8;i<15;i++)setFn(8,size-15+i,getBit(bits,i));
      setFn(8,size-8,true);
    }
    // Version bits
    if(ver>=7){
      let rem=ver;for(let i=0;i<12;i++)rem=rem<<1^(rem>>>11)*0x1F25;
      const bits=ver<<12|rem;
      for(let i=0;i<18;i++){setFn(size-11+i%3,Math.floor(i/3),getBit(bits,i));setFn(Math.floor(i/3),size-11+i%3,getBit(bits,i));}
    }
    drawFormat(0);

    // Data codewords
    let idx=0;
    for(let right=size-1;right>=1;right-=2){
      if(right===6)right=5;
      for(let vert=0;vert<size;vert++){
        for(let j=0;j<2;j++){
          const x=right-j,up=((right+1)&2)===0,y=up?size-1-vert:vert;
          if(!isFn[y][x]&&idx<result.length*8){mods[y][x]=getBit(result[idx>>>3],7-(idx&7));idx++;}
        }
      }
    }

    // Masking
    function applyMask(mask){
      for(let y=0;y<size;y++)for(let x=0;x<size;x++){
        if(isFn[y][x])continue;
        let inv;
        switch(mask){
          case 0:inv=(x+y)%2===0;break;case 1:inv=y%2===0;break;
          case 2:inv=x%3===0;break;case 3:inv=(x+y)%3===0;break;
          case 4:inv=(Math.floor(x/3)+Math.floor(y/2))%2===0;break;
          case 5:inv=x*y%2+x*y%3===0;break;
          case 6:inv=(x*y%2+x*y%3)%2===0;break;
          case 7:inv=((x+y)%2+x*y%3)%2===0;break;
        }
        if(inv)mods[y][x]=!mods[y][x];
      }
    }
    function penalty(){
      let r=0;
      for(let y=0;y<size;y++){let rc=false,rx=0;for(let x=0;x<size;x++){if(mods[y][x]===rc){rx++;if(rx===5)r+=3;else if(rx>5)r++;}else{rc=mods[y][x];rx=1;}}}
      for(let x=0;x<size;x++){let rc=false,ry=0;for(let y=0;y<size;y++){if(mods[y][x]===rc){ry++;if(ry===5)r+=3;else if(ry>5)r++;}else{rc=mods[y][x];ry=1;}}}
      for(let y=0;y<size-1;y++)for(let x=0;x<size-1;x++){const c=mods[y][x];if(c===mods[y][x+1]&&c===mods[y+1][x]&&c===mods[y+1][x+1])r+=3;}
      let dark=0;for(const row of mods)for(const c of row)if(c)dark++;
      const tot=size*size,k=Math.ceil(Math.abs(dark*20-tot*10)/tot)-1;r+=k*10;
      return r;
    }
    let bestMask=-1,bestPen=Infinity;
    for(let m=0;m<8;m++){applyMask(m);drawFormat(m);const p=penalty();if(p<bestPen){bestPen=p;bestMask=m;}applyMask(m);}
    applyMask(bestMask);drawFormat(bestMask);
    return mods;
  }

  // ── Draw matrix to canvas ─────────────────────────────────────────────────
  function drawQR(canvas, text) {
    const matrix = makeQR(text);
    const N    = matrix.length;
    const SIZE = 200;
    const cell = Math.floor(SIZE / (N + 8));
    const off  = Math.floor((SIZE - cell * N) / 2);
    canvas.width = canvas.height = SIZE;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, SIZE, SIZE);
    ctx.fillStyle = '#0b1120';
    for (let r = 0; r < N; r++)
      for (let c = 0; c < N; c++)
        if (matrix[r][c]) ctx.fillRect(off + c*cell, off + r*cell, cell, cell);
  }

  // ── Trigger when detail.js reveals the submission ────────────────────────
  // detail.js sets submission-section display:block — we watch that and
  // also show the whole row, then encode the submission text into the QR.
  function showQR() {
    const row    = document.getElementById('submission-qr-row');
    const canvas = document.getElementById('qr-canvas');
    if (!row || !canvas || row.style.display === 'grid') return;

    // Show the row (submission card + QR card)
    row.style.display = 'grid';

    // Get the submitted text to encode
    const submissionText = document.getElementById('task-submission')?.textContent?.trim() || '';

    // Encode as a data URI so scanning the QR downloads the plain text file
    const dataUri = 'data:text/plain;charset=utf-8,' + encodeURIComponent(submissionText);

    try { drawQR(canvas, dataUri); }
    catch(e) {
      // If text is too long for a QR (>~2900 chars), encode a shorter version
      const truncated = submissionText.slice(0, 800);
      try { drawQR(canvas, 'data:text/plain;charset=utf-8,' + encodeURIComponent(truncated + '\n[truncated — download for full text]')); }
      catch(e2) { console.warn('QR error:', e2); }
    }
  }

  // Watch for detail.js revealing the submission
  const sub = document.getElementById('submission-section');
  if (sub) {
    new MutationObserver(() => { if (sub.style.display === 'block') showQR(); })
      .observe(sub, { attributes: true, attributeFilter: ['style'] });
    if (sub.style.display === 'block') showQR();
  }

  // Download button — saves submission text as a .txt file directly
  document.getElementById('qr-download-btn')?.addEventListener('click', () => {
    const text = document.getElementById('task-submission')?.textContent?.trim() || '';
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.download = 'submission.txt';
    a.href = URL.createObjectURL(blob);
    a.click();
    URL.revokeObjectURL(a.href);
  });

})();
</script>
