<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Forgot Password — IELTS Platform</title>
  <script src="/js/core/theme.js"></script>
  <link rel="stylesheet" href="/css/base.css"/>
  <link rel="stylesheet" href="/css/pages/auth.css"/>
</head>
<body>

  <header class="page-header">
    <a href="/" class="page-brand">
      <span class="page-brand-mark">I</span>
      <span class="page-brand-name">IELTS Platform</span>
    </a>
  </header>

  <main class="page-main">
    <div class="auth-card">

      <!-- Step 1: Email request -->
      <div class="step" id="stepRequest">
        <div class="card-icon default">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="card-title">Forgot your password?</h1>
        <p class="card-sub">Enter your email and we'll send you a secure link to reset your password.</p>

        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
              <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required/>
            </div>
            <span class="field-error" id="emailError"></span>
          </div>
          <button type="submit" class="btn-primary" id="submitBtn">
            <span id="btnText">Send reset link</span>
            <span id="btnRing" class="btn-ring hidden"></span>
          </button>
        </form>

        <a href="/pages/auth/login.html" class="back-link">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
          Back to sign in
        </a>
      </div>

      <!-- Step 2: Sent confirmation -->
      <div class="step hidden" id="stepSent">
        <div class="card-icon success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="14" rx="2" ry="2"/>
            <path d="M2 7l10 5 10-5"/>
          </svg>
        </div>
        <h1 class="card-title">Check your inbox</h1>
        <p class="card-sub">If an account exists for <strong id="sentEmail"></strong>, a reset link is on its way. The link expires in <strong>30 minutes</strong>.</p>
        <p class="card-hint">Can't find it? Check your spam folder.</p>
        <button class="btn-secondary" id="resendBtn">Resend email</button>
        <a href="/pages/auth/login.html" class="back-link">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
          Back to sign in
        </a>
      </div>

    </div>
  </main>

  <script type="module" src="/js/pages/auth/forgot_password.js"></script>
</body>
</html>
