<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — IELTS Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/base.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:   #0b1120;
      --frost: #f5f3ef;
      --gold:  #c9a84c;
      --blue:  #4d7cfe;
    }

    html, body { height: 100%; }
    body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--frost);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
    }

    /* ── Page chrome ─────────────────────────────────────────────────────── */
    .page-header {
      padding: 22px 36px;
      border-bottom: 1px solid rgba(0,0,0,.07);
      background: #fff;
    }
    .page-brand {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none;
    }
    .page-brand-mark {
      width: 32px; height: 32px;
      background: var(--ink);
      border-radius: 8px;
      display: grid; place-items: center;
      font-family: 'Playfair Display', serif;
      font-weight: 700; font-size: 16px; color: #fff;
    }
    .page-brand-name {
      font-size: .88rem; font-weight: 600;
      color: var(--ink); letter-spacing: .01em;
    }

    /* ── Main ────────────────────────────────────────────────────────────── */
    .page-main {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 48px 20px;
    }

    /* ── Card ────────────────────────────────────────────────────────────── */
    .auth-card {
      width: 100%; max-width: 420px;
      background: #fff;
      border-radius: 18px;
      padding: 44px 40px;
      border: 1px solid #e8e4dc;
      box-shadow:
        0 1px 3px rgba(0,0,0,.04),
        0 12px 32px rgba(0,0,0,.07),
        0 32px 64px rgba(0,0,0,.04);
      animation: cardIn .42s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(22px) scale(.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1);  }
    }

    /* Step transitions */
    .step { animation: stepIn .32s cubic-bezier(.16,1,.3,1) both; }
    @keyframes stepIn {
      from { opacity: 0; transform: translateX(14px); }
      to   { opacity: 1; transform: translateX(0);    }
    }
    .hidden { display: none !important; }

    /* ── Icon ring ───────────────────────────────────────────────────────── */
    .card-icon {
      width: 62px; height: 62px;
      border-radius: 16px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 24px;
    }
    .card-icon svg { width: 28px; height: 28px; }
    .card-icon.default { background: #f0f3ff; color: var(--blue); }
    .card-icon.success { background: #f0fdf4; color: #16a34a; }
    .card-icon.error   { background: #fff2f2; color: #dc2626; }
    .card-icon.loading {
      background: #f8f7f4;
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.55} }

    .spinner {
      width: 28px; height: 28px;
      border: 3px solid #e2e7f0;
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Typography ──────────────────────────────────────────────────────── */
    .card-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.55rem; font-weight: 700;
      letter-spacing: -.02em;
      color: var(--ink);
      text-align: center;
      margin-bottom: 10px;
      line-height: 1.2;
    }
    .card-sub {
      font-size: .875rem; color: #6b7a96;
      text-align: center; line-height: 1.7;
      margin-bottom: 28px;
    }
    .card-sub strong { color: var(--ink); font-weight: 600; }
    .card-hint {
      font-size: .78rem; color: #9daab8;
      text-align: center; margin-bottom: 16px;
    }

    /* ── Form ────────────────────────────────────────────────────────────── */
    .form-group { margin-bottom: 20px; }
    .form-group label {
      display: block;
      font-size: .72rem; font-weight: 600;
      color: #4e5a70;
      margin-bottom: 7px;
      letter-spacing: .06em; text-transform: uppercase;
    }
    .input-wrap { position: relative; }
    .input-icon {
      position: absolute; left: 13px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: #b6bfcc; pointer-events: none;
    }
    .form-group input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      border: 1.5px solid #dde2ec;
      border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; color: var(--ink);
      background: #fafbfd;
      outline: none;
      transition: border-color .15s, box-shadow .15s, background .15s;
    }
    .form-group input::placeholder { color: #b6bfcc; }
    .form-group input:focus {
      border-color: var(--blue);
      background: #fff;
      box-shadow: 0 0 0 3px rgba(77,124,254,.11);
    }
    .form-group input.is-error {
      border-color: #dc2626;
      box-shadow: 0 0 0 3px rgba(220,38,38,.09);
    }
    .field-error {
      display: block; font-size: .74rem; color: #dc2626;
      margin-top: 5px; min-height: 14px;
    }

    /* ── Buttons ─────────────────────────────────────────────────────────── */
    .btn-primary {
      width: 100%; padding: 13px;
      background: var(--ink); color: #fff;
      border: none; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .9rem; font-weight: 600;
      cursor: pointer; letter-spacing: .02em;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      transition: background .15s, transform .1s, box-shadow .15s;
      position: relative; overflow: hidden; text-decoration: none;
    }
    .btn-primary::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.07) 0%, transparent 55%);
    }
    .btn-primary:hover { background: #1a2640; box-shadow: 0 5px 18px rgba(11,17,32,.2); }
    .btn-primary:active { transform: scale(.985); }
    .btn-primary:disabled { opacity: .55; cursor: not-allowed; }

    .btn-secondary {
      width: 100%; padding: 12px;
      background: transparent; color: var(--blue);
      border: 1.5px solid #dde2ec; border-radius: 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: .88rem; font-weight: 600;
      cursor: pointer; margin-bottom: 12px;
      transition: background .14s, border-color .14s;
    }
    .btn-secondary:hover { background: #f0f4ff; border-color: #c8d4fd; }
    .btn-secondary:disabled { opacity: .45; cursor: not-allowed; }

    /* Spinner inside button */
    .btn-ring {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: inline-block; flex-shrink: 0;
    }

    /* ── Back link ───────────────────────────────────────────────────────── */
    .back-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      margin-top: 20px;
      font-size: .82rem; color: #7a8aa0;
      text-decoration: none;
      transition: color .14s;
    }
    .back-link svg { width: 13px; height: 13px; flex-shrink: 0; }
    .back-link:hover { color: var(--blue); }
  </style>
</head>
<body>

  <header class="page-header">
    <a href="/" class="page-brand">
      <span class="page-brand-mark">I</span>
      <span class="page-brand-name">IELTS Platform</span>
    </a>
  </header>

  <main class="page-main">
    <div class="auth-card">

      <!-- Step 1: Email request -->
      <div class="step" id="stepRequest">
        <div class="card-icon default">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="card-title">Forgot your password?</h1>
        <p class="card-sub">Enter your email and we'll send you a secure link to reset your password.</p>

        <form id="forgotForm" novalidate>
          <div class="form-group">
            <label for="email">Email address</label>
            <div class="input-wrap">
              <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/>
                <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/>
              </svg>
              <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
            </div>
            <span class="field-error" id="emailError"></span>
          </div>
          <button type="submit" class="btn-primary" id="submitBtn">
            <span id="btnText">Send reset link</span>
            <span id="btnRing" class="btn-ring hidden"></span>
          </button>
        </form>

        <a href="/pages/auth/login.html" class="back-link">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
          Back to sign in
        </a>
      </div>

      <!-- Step 2: Sent confirmation -->
      <div class="step hidden" id="stepSent">
        <div class="card-icon success">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8 19.79 19.79 0 01.22 2.18 2 2 0 012.22 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91"/>
            <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 0112 12"/>
            <rect x="2" y="2" width="20" height="14" rx="2" ry="2"/>
            <path d="M2 7l10 5 10-5"/>
          </svg>
        </div>
        <h1 class="card-title">Check your inbox</h1>
        <p class="card-sub">If an account exists for <strong id="sentEmail"></strong>, a reset link is on its way. The link expires in <strong>30 minutes</strong>.</p>
        <p class="card-hint">Can't find it? Check your spam folder.</p>
        <button class="btn-secondary" id="resendBtn">Resend email</button>
        <a href="/pages/auth/login.html" class="back-link">
          <svg viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z" clip-rule="evenodd"/></svg>
          Back to sign in
        </a>
      </div>

    </div>
  </main>

  <script type="module" src="/js/pages/auth/forgot_password.js"></script>
</body>
</html>
