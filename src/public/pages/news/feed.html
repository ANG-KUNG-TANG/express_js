<!DOCTYPE html><html lang="en">
<head><meta charset="UTF-8"/><title>News Feed — IELTS Platform</title>
  <script src="/js/core/theme.js"></script> 
<link rel="stylesheet" href="/css/base.css"/>
<style>
  .news-header { display: flex; align-items: flex-start; justify-content: space-between; flex-wrap: wrap; gap: 16px; margin-bottom: 24px; }
  .search-row { margin-bottom: 24px; }
  .search-row input { max-width: 440px; }
  .news-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; margin-bottom: 32px; }
  .news-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; display: flex; flex-direction: column; transition: border-color .14s, box-shadow .14s; cursor: pointer; }
  .news-card:hover { border-color: #c0c9d4; box-shadow: var(--shadow-sm); }
  .news-card__img { height: 160px; background: var(--bg); overflow: hidden; }
  .news-card__img img { width: 100%; height: 100%; object-fit: cover; }
  .news-card__body { padding: 18px 20px; flex: 1; display: flex; flex-direction: column; }
  .news-card__tag { font-size: .68rem; font-weight: 700; letter-spacing: .08em; text-transform: uppercase; color: var(--accent); margin-bottom: 8px; }
  .news-card__title { font-size: .95rem; font-weight: 600; line-height: 1.4; color: var(--text); margin-bottom: 8px; }
  .news-card__summary { font-size: .82rem; line-height: 1.6; color: var(--text-secondary); flex: 1; }
  .news-card__foot { padding: 14px 20px; border-top: 1px solid var(--border-light); display: flex; justify-content: space-between; align-items: center; }
</style>
</head>
<body>
<<div class="page-body">

  <div class="page-hero animate-in">
    <p class="page-hero__eyebrow">Personalised News</p>
    <h1 class="page-hero__title">Your Feed</h1>
    <p class="page-hero__sub">
      Articles tailored to your selected interests to strengthen reading and vocabulary.
    </p>

    <div class="quick-actions">
      <a href="/pages/news/interests.html" class="btn btn--secondary">
        Manage Interests
      </a>
      <a href="/pages/news/search.html" class="btn btn--ghost">
        Search
      </a>
      <a href="/pages/news/category.html" class="btn btn--ghost">
        Browse Categories
      </a>
    </div>
  </div>

  <div class="page-section">
    <input type="text" id="search-input"
           class="input"
           placeholder="Search within your feed…" />
  </div>

  <div class="page-section">
    <p id="loading-state">Loading your personalised feed…</p>
    <div id="news-grid" class="news-grid"></div>
  </div>

  <div class="page-section" style="text-align:center;">
    <button id="next-page-btn" class="btn btn--ghost">
      Load More Articles
    </button>
  </div>

</div>
<script type="module" src="/js/pages/news/feed.js"></script>
</body></html>
