<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Article — IELTS Platform</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <script src="/js/core/theme.js"></script> 
  <link rel="stylesheet" href="/css/base.css" />

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --ink:    #0b1120;
      --ink-2:  #1a2640;
      --frost:  #f5f3ef;
      --gold:   #c9a84c;
      --blue:   #4d7cfe;
      --muted:  #6b7a96;
      --border: #e8edf5;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--frost);
    }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-flex; align-items: center; gap: 7px;
      font-size: .82rem; font-weight: 500;
      color: var(--muted); text-decoration: none;
      margin-bottom: 28px;
      transition: color .14s, gap .14s;
    }
    .back-link:hover { color: var(--ink); gap: 10px; }
    .back-link svg { width: 14px; height: 14px; }

    /* ── LAYOUT ── */
    .article-page {
      max-width: 780px;
      margin: 0 auto;
      padding: 32px 24px 80px;
    }

    /* ── HERO IMAGE ── */
    .article-hero {
      width: 100%;
      height: 340px;
      border-radius: 16px;
      overflow: hidden;
      background: #dde3ed;
      margin-bottom: 36px;
      position: relative;
    }
    .article-hero img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .article-hero__placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    .article-hero__placeholder svg { width: 48px; height: 48px; color: #a0adc0; }

    /* ── META HEADER ── */
    .article-meta {
      margin-bottom: 20px;
      display: flex; align-items: center;
      flex-wrap: wrap; gap: 10px;
    }
    .article-category {
      font-size: .68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--blue);
      background: #eef2ff; border: 1px solid #c5d3fd;
      padding: 3px 10px; border-radius: 99px;
    }
    .article-date {
      font-size: .8rem; color: var(--muted);
    }
    .article-source {
      font-size: .8rem; color: var(--muted);
      display: flex; align-items: center; gap: 5px;
    }
    .article-source::before {
      content: '·'; opacity: .4;
    }

    /* ── TITLE ── */
    .article-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.1rem; font-weight: 700;
      line-height: 1.2; color: var(--ink);
      letter-spacing: -.02em;
      margin: 0 0 16px;
    }

    /* ── SUMMARY / LEAD ── */
    .article-summary {
      font-size: 1.05rem;
      line-height: 1.7;
      color: #4b5563;
      font-style: italic;
      border-left: 3px solid var(--gold);
      padding-left: 18px;
      margin-bottom: 32px;
    }

    /* ── DIVIDER ── */
    .article-divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 28px 0;
    }

    /* ── BODY CONTENT ── */
    .article-body {
      font-size: .975rem;
      line-height: 1.85;
      color: #374151;
    }
    .article-body p { margin: 0 0 1.3em; }
    .article-body h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.35rem; font-weight: 700;
      color: var(--ink); margin: 1.8em 0 .6em;
    }
    .article-body h3 {
      font-size: 1.05rem; font-weight: 600;
      color: var(--ink); margin: 1.4em 0 .5em;
    }
    .article-body a {
      color: var(--blue); text-decoration: underline;
      text-decoration-color: #c5d3fd;
    }
    .article-body a:hover { text-decoration-color: var(--blue); }
    .article-body blockquote {
      border-left: 3px solid var(--border);
      padding-left: 18px;
      margin: 1.4em 0;
      color: var(--muted);
      font-style: italic;
    }

    /* ── FOOTER: SOURCE LINK ── */
    .article-footer {
      margin-top: 40px;
      padding-top: 24px;
      border-top: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .article-footer__label {
      font-size: .78rem; color: var(--muted);
    }
    .article-source-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 9px 18px;
      background: var(--ink); color: #fff;
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: .82rem; font-weight: 600;
      text-decoration: none;
      transition: background .14s, box-shadow .14s;
    }
    .article-source-btn:hover {
      background: var(--ink-2);
      box-shadow: 0 4px 14px rgba(11,17,32,.18);
    }
    .article-source-btn svg { width: 13px; height: 13px; flex-shrink: 0; }

    /* ── SKELETON / LOADING ── */
    .skeleton {
      background: linear-gradient(90deg, #e8edf5 25%, #f0f3f8 50%, #e8edf5 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .sk-hero  { height: 340px; border-radius: 16px; margin-bottom: 36px; }
    .sk-tag   { height: 22px; width: 80px; border-radius: 99px; }
    .sk-date  { height: 16px; width: 120px; margin-top: 4px; }
    .sk-title { height: 36px; margin: 16px 0 8px; }
    .sk-title-2 { height: 36px; width: 70%; margin-bottom: 24px; }
    .sk-line  { height: 14px; margin-bottom: 10px; }
    .sk-line--short { width: 60%; }

    /* ── ERROR STATE ── */
    .article-error {
      text-align: center;
      padding: 60px 20px;
    }
    .article-error svg { width: 40px; height: 40px; color: #a0adc0; margin-bottom: 16px; }
    .article-error h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem; color: var(--ink); margin-bottom: 8px;
    }
    .article-error p { font-size: .9rem; color: var(--muted); margin-bottom: 24px; }
    .article-error a {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 9px 18px; background: var(--ink); color: #fff;
      border-radius: 9px; font-size: .875rem; font-weight: 600;
      text-decoration: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .article-loaded { animation: fadeUp .35s cubic-bezier(.16,1,.3,1) both; }

    @media (max-width: 600px) {
      .article-page { padding: 20px 16px 60px; }
      .article-title { font-size: 1.6rem; }
      .article-hero  { height: 220px; }
    }
  </style>
</head>
<body class="page">
<div class="article-page">

  <a href="/pages/news/feed.html" class="back-link" id="back-link">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <polyline points="15 18 9 12 15 6"/>
    </svg>
    Your Feed
  </a>

  <!-- Content injected here by JS -->
  <div id="article-root"></div>

</div>
<script type="module" src="/js/pages/news/article.js"></script>
</body>
</html>
