<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow — Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="dashboard-body">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="brand-mark">T</span>
            <span class="brand-name">TaskFlow</span>
        </div>

        <nav class="sidebar-nav">
            <a href="#tasks" class="nav-item active" data-view="tasks">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                Tasks
            </a>
            <a href="#profile" class="nav-item" data-view="profile">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                Profile
            </a>
        </nav>

        <div class="sidebar-footer">
            <div class="user-chip" id="user-chip">
                <div class="user-avatar" id="user-avatar">?</div>
                <div class="user-info">
                    <span class="user-name" id="user-name">Loading…</span>
                    <span class="user-role" id="user-role"></span>
                </div>
            </div>
            <button id="btn-logout" class="btn-icon" title="Logout">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
        </div>
    </aside>

    <!-- Main -->
    <main class="main-content" id="main-content">

        <!-- ─── Tasks View ────────────────────────────────────────────────── -->
        <section id="view-tasks" class="view active">

            <div class="page-header">
                <div>
                    <h1 class="page-title">Tasks</h1>
                    <p class="page-subtitle" id="task-count-label">Loading…</p>
                </div>
                <button class="btn btn-primary" id="btn-new-task">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    New Task
                </button>
            </div>

            <!-- Toolbar -->
            <div class="toolbar">
                <div class="search-wrap">
                    <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="search" id="task-search" class="search-input" placeholder="Search tasks…">
                </div>
                <div class="filter-group">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="pending">Pending</button>
                    <button class="filter-btn" data-filter="in_progress">In Progress</button>
                    <button class="filter-btn" data-filter="done">Done</button>
                </div>
            </div>

            <!-- Alerts -->
            <div id="task-alert" class="alert hidden"></div>

            <!-- Kanban columns -->
            <div class="kanban" id="kanban-board">
                <div class="kanban-col" data-status="pending">
                    <div class="kanban-col-header">
                        <span class="col-dot dot-pending"></span>
                        <span class="col-title">Pending</span>
                        <span class="col-count" id="count-pending">0</span>
                    </div>
                    <div class="kanban-cards" id="col-pending"></div>
                </div>
                <div class="kanban-col" data-status="in_progress">
                    <div class="kanban-col-header">
                        <span class="col-dot dot-progress"></span>
                        <span class="col-title">In Progress</span>
                        <span class="col-count" id="count-in_progress">0</span>
                    </div>
                    <div class="kanban-cards" id="col-in_progress"></div>
                </div>
                <div class="kanban-col" data-status="done">
                    <div class="kanban-col-header">
                        <span class="col-dot dot-done"></span>
                        <span class="col-title">Done</span>
                        <span class="col-count" id="count-done">0</span>
                    </div>
                    <div class="kanban-cards" id="col-done"></div>
                </div>
            </div>

            <!-- Empty state -->
            <div id="empty-tasks" class="empty-state hidden">
                <div class="empty-icon">📋</div>
                <h3>No tasks yet</h3>
                <p>Create your first task to get started.</p>
                <button class="btn btn-primary" id="btn-empty-create">Create a task</button>
            </div>

            <!-- Loading skeleton -->
            <div id="task-loading" class="loading-skeletons hidden">
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
                <div class="skeleton-card"></div>
            </div>

        </section>

        <!-- ─── Profile View ──────────────────────────────────────────────── -->
        <section id="view-profile" class="view hidden">
            <div class="page-header">
                <div>
                    <h1 class="page-title">Profile</h1>
                    <p class="page-subtitle">Manage your account</p>
                </div>
            </div>

            <div class="profile-card">
                <div class="profile-avatar-lg" id="profile-avatar-lg">?</div>
                <div id="profile-alert" class="alert hidden"></div>
                <form id="profile-form">
                    <div class="field">
                        <label>Full name</label>
                        <input type="text" name="name" id="profile-name">
                    </div>
                    <div class="field">
                        <label>Email</label>
                        <input type="email" name="email" id="profile-email" readonly>
                    </div>
                    <div class="field">
                        <label>Role</label>
                        <input type="text" id="profile-role-field" readonly>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <span class="btn-label">Save changes</span>
                        <span class="btn-loader hidden"></span>
                    </button>
                </form>
            </div>
        </section>

    </main>

    <!-- ─── Modal Overlay ─────────────────────────────────────────────────── -->
    <div class="modal-overlay hidden" id="modal-overlay">
        <div class="modal" id="modal" role="dialog" aria-modal="true">
            <!-- injected by JS -->
        </div>
    </div>

    <script type="module" src="/js/pages/dashboard.js"></script>
</body>
</html>
