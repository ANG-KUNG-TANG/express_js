<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard — WriteSystem</title>
    <script src="/js/core/theme.js"></script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
    <link rel="stylesheet" href="/css/pages/teacher.css" />
</head>
<body data-role="teacher">
<!--
  Teacher sidebar injected here by initTeacherSidebar().
  Do NOT add a hardcoded <aside>.
-->

<div class="admin-main">

    <!-- ── Top bar ─────────────────────────────────────────────────────────── -->
    <header class="adm-topbar">
        <div>
            <div class="adm-topbar-title">Teacher Dashboard</div>
            <div class="adm-topbar-crumb">Teacher <span>›</span> <span>Overview</span></div>
        </div>
        <div class="adm-search">
            <span class="adm-search-icon">⌕</span>
            <input type="text" placeholder="Search tasks, students…" autocomplete="off" />
        </div>
        <div class="adm-topbar-actions">
            <button class="adm-icon-btn" title="Assign task"
                    onclick="window.location='/pages/teacher/assign.html'">✎</button>
            <button class="adm-icon-btn" title="Alerts">◉<span class="dot"></span></button>
        </div>
    </header>

    <div class="adm-content">

        <!-- ── NEW: Animated 5-card stat grid ─────────────────────────────── -->
        <!--
            JS writes into #teacher-stats-grid via _renderStatCards() /
            _renderStatsSkeleton(). The grid renders shimmer placeholders
            immediately, then swaps in animated count-up cards once data loads.

            Original 3 inline stat divs (#stat-submitted / #stat-reviewed /
            #stat-scored) are REMOVED — the JS now targets element IDs that
            live inside the dynamically-rendered cards inside this grid.
        -->
        <div id="teacher-stats-grid" class="tr-stats-grid"></div>

        <!-- ── Students ────────────────────────────────────────────────────── -->
        <!--
            NEW additions to each student card (rendered by JS _studentCard()):
              • "avg band X.X" stat pill — from scored tasks
              • "Profile" button  → /pages/teacher/teacher_student_profile.html
              • "Tasks" button    → /pages/teacher/student_tasks.html  (was "View tasks")
              • "+ Assign" button → /pages/teacher/assign.html         (was "+ Assign task")

            stat-pill--neutral is a new modifier — add it to teacher.css.
            stat-pill--info    was already in base.css via .badge--info.
        -->
        <div class="adm-card" style="margin-bottom:20px">
            <div class="adm-card-hd">
                <span class="adm-card-title">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="1.8" style="vertical-align:-2px;margin-right:5px">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                    Your Students
                </span>
                <a class="adm-card-action" href="/pages/teacher/assign.html">+ Assign task →</a>
            </div>
            <div id="students-list">
                <p class="loading">Loading students…</p>
            </div>
        </div>

        <!-- ── Review queue ─────────────────────────────────────────────────── -->
        <!--
            NEW: timestamps now rendered by _fmtDateTime() (day + time),
            previously only showed date.
            No HTML changes needed here — JS writes the rows.
        -->
        <div class="adm-card" style="margin-bottom:20px">
            <div class="adm-card-hd">
                <span class="adm-card-title">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2" style="vertical-align:-1px;margin-right:5px;color:var(--amber)">
                        <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/>
                        <line x1="12" y1="9" x2="12" y2="13"/>
                        <line x1="12" y1="17" x2="12.01" y2="17"/>
                    </svg>
                    Review Queue
                </span>
                <span class="adm-card-meta">Submitted tasks · oldest first · shows time of submission</span>
            </div>
            <div id="pending-list">
                <p class="loading">Loading…</p>
            </div>
        </div>

        <!-- ── All tasks ─────────────────────────────────────────────────────── -->
        <div class="adm-card">
            <div class="adm-card-hd">
                <span class="adm-card-title">All Tasks</span>
                <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
                    <input id="task-search" type="text" class="input input--sm"
                           placeholder="Search by title…" style="width:200px" />
                    <select id="task-status-filter" class="select select--sm" style="width:160px">
                        <option value="">All statuses</option>
                        <option value="ASSIGNED">Assigned</option>
                        <option value="SUBMITTED">Submitted</option>
                        <option value="REVIEWED">Reviewed</option>
                        <option value="SCORED">Scored</option>
                    </select>
                </div>
            </div>
            <div id="tasks-list">
                <p class="loading">Loading tasks…</p>
            </div>
        </div>

    </div><!-- /adm-content -->
</div><!-- /admin-main -->

<div id="toast-container"></div>
<script type="module" src="/js/pages/teacher/dashboard.js"></script>
</body>
</html>
