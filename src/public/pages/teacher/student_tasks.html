<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Tasks — WriteSystem</title>
    <script src="/js/core/theme.js"></script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/teacher.css" />
    
</head>
<body data-role="teacher">
<!--
  Teacher sidebar injected here by initTeacherSidebar().
  Do NOT add a hardcoded <aside>.
-->

<div class="admin-main">

    <header class="adm-topbar">
        <div style="display:flex;align-items:center;gap:14px">
            <a href="/pages/teacher/dashboard.html"
               style="font-size:12px;color:var(--text3);text-decoration:none;transition:color .15s"
               onmouseover="this.style.color='var(--text)'"
               onmouseout="this.style.color='var(--text3)'">← Dashboard</a>
            <span style="color:var(--border-hi);font-size:14px">/</span>
            <div>
                <div class="adm-topbar-title" id="page-title">Student Tasks</div>
                <div class="adm-topbar-crumb">Teacher <span>›</span> <span>Students</span></div>
            </div>
        </div>
        <div class="adm-search">
            <span class="adm-search-icon">⌕</span>
            <input type="text" placeholder="Search tasks, students…" autocomplete="off" />
        </div>
        <div class="adm-topbar-actions">
            <button id="assign-btn" class="btn btn--primary btn--sm">+ Assign task</button>
            <button class="adm-icon-btn" title="Alerts">◉<span class="dot"></span></button>
        </div>
    </header>

    <div class="adm-content">

        <!-- Student info block — rendered by student_tasks.js -->
        <div id="student-info"></div>

        <!-- Tasks table -->
        <div class="adm-card">
            <div class="adm-card-hd">
                <span class="adm-card-title">Tasks</span>
                <div style="display:flex;gap:8px;align-items:center">
                    <select id="filter-status" class="input input--sm" style="width:160px">
                        <option value="">All statuses</option>
                        <option value="ASSIGNED">Assigned</option>
                        <option value="WRITING">Writing</option>
                        <option value="SUBMITTED">Submitted</option>
                        <option value="REVIEWED">Reviewed</option>
                        <option value="SCORED">Scored</option>
                    </select>
                </div>
            </div>
            <div id="tasks-list">
                <p class="loading">Loading…</p>
            </div>
        </div>

    </div><!-- /adm-content -->
</div><!-- /admin-main -->

<div id="toast-container"></div>
<script type="module" src="/js/pages/teacher/student_tasks.js"></script>
</body>
</html>
