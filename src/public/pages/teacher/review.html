<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Task — WriteSystem</title>
    <script src="/js/core/theme.js"></script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
    <style>
        /* ── Teacher accent ───────────────────────────────────────────────── */
        .btn--primary {
            background: var(--sage, #3a7d5a)   !important;
            border-color: var(--sage, #3a7d5a) !important;
        }
        .btn--primary:hover:not(:disabled) {
            background: #4a9d6a   !important;
            border-color: #4a9d6a !important;
        }
        .input:focus, textarea.input:focus {
            border-color: var(--sage, #3a7d5a);
            box-shadow: 0 0 0 3px rgba(58,125,90,.15);
        }
        /* Band score display */
        .band-display {
            font-size: 22px; font-weight: 800;
            font-family: var(--font-mono, monospace);
            color: var(--gold2, #e6c96e);
        }
    </style>
</head>
<body>
<!--
  Teacher sidebar injected here by initTeacherSidebar().
  Do NOT add a hardcoded <aside>.
-->

<div class="admin-main">

    <header class="adm-topbar">
        <div style="display:flex;align-items:center;gap:14px">
            <a href="/pages/teacher/dashboard.html"
               style="font-size:12px;color:var(--text3);text-decoration:none;transition:color .15s"
               onmouseover="this.style.color='var(--text)'"
               onmouseout="this.style.color='var(--text3)'">← Dashboard</a>
            <span style="color:var(--border-hi);font-size:14px">/</span>
            <div>
                <div class="adm-topbar-title">Review Task</div>
                <div class="adm-topbar-crumb">Teacher <span>›</span>
                    <span id="page-mode-label">View Mode</span>
                </div>
            </div>
        </div>
        <div class="adm-search">
            <span class="adm-search-icon">⌕</span>
            <input type="text" placeholder="Search tasks, students…" autocomplete="off" />
        </div>
        <div class="adm-topbar-actions">
            <span id="task-status"></span>
            <button class="adm-icon-btn" title="Alerts">◉<span class="dot"></span></button>
        </div>
    </header>

    <div class="adm-content">

        <!-- Task info card -->
        <div class="adm-card" style="margin-bottom:20px">
            <div class="adm-card-hd">
                <div style="flex:1;min-width:0">
                    <div class="adm-card-title" id="task-title">Loading…</div>
                    <div style="font-size:11px;color:var(--text3);
                                font-family:var(--font-mono,monospace);margin-top:2px"
                         id="task-type"></div>
                </div>
            </div>
            <div style="padding:16px 20px">
                <!-- Meta row -->
                <div style="display:flex;flex-wrap:wrap;gap:20px;
                            padding-bottom:14px;border-bottom:1px solid var(--border);
                            margin-bottom:16px;font-size:13px;color:var(--text2)">
                    <span><strong style="color:var(--text3);font-size:11px;
                                         font-family:var(--font-mono,monospace);
                                         text-transform:uppercase;letter-spacing:.06em">
                        Student</strong><br>
                        <span id="task-student">—</span>
                    </span>
                    <span><strong style="color:var(--text3);font-size:11px;
                                         font-family:var(--font-mono,monospace);
                                         text-transform:uppercase;letter-spacing:.06em">
                        Words</strong><br>
                        <span id="task-wordcount" style="font-family:var(--font-mono,monospace)">—</span>
                    </span>
                    <span><strong style="color:var(--text3);font-size:11px;
                                         font-family:var(--font-mono,monospace);
                                         text-transform:uppercase;letter-spacing:.06em">
                        Due</strong><br>
                        <span id="task-duedate" style="font-family:var(--font-mono,monospace)">—</span>
                    </span>
                </div>

                <!-- Prompt -->
                <div style="margin-bottom:16px">
                    <div class="input-label" style="margin-bottom:6px">Question Prompt</div>
                    <div id="task-prompt"
                         style="background:var(--surface2);border:1px solid var(--border-hi);
                                border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.7;
                                color:var(--text2);white-space:pre-wrap;
                                max-height:160px;overflow-y:auto;min-height:40px">—</div>
                </div>

                <!-- Submission -->
                <div>
                    <div class="input-label" style="margin-bottom:6px">Student Submission</div>
                    <div id="task-submission"
                         style="background:var(--surface2);border:1px solid var(--border-hi);
                                border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.8;
                                color:var(--text);white-space:pre-wrap;
                                max-height:400px;overflow-y:auto;min-height:64px">—</div>
                </div>
            </div>
        </div>

        <!-- Editable review section (shown when mode=review AND status=SUBMITTED) -->
        <div class="adm-card" id="review-section" style="margin-bottom:20px">
            <div class="adm-card-hd">
                <span class="adm-card-title">Feedback &amp; Score</span>
                <span style="font-size:11px;color:var(--text3);font-family:var(--font-mono,monospace)">
                    IELTS band 0–9
                </span>
            </div>
            <div style="padding:20px">
                <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:16px">
                    <label class="input-label" for="feedback-input">Your Feedback</label>
                    <textarea id="feedback-input" class="input"
                              style="min-height:140px;resize:vertical"
                              placeholder="Write detailed feedback for the student…"></textarea>
                </div>
                <div style="display:flex;flex-direction:column;gap:4px;margin-bottom:20px">
                    <label class="input-label" for="band-score-input">Band Score (0–9)</label>
                    <input id="band-score-input" class="input input--sm" type="number"
                           min="0" max="9" step="0.5"
                           placeholder="e.g. 6.5" style="width:140px" />
                </div>
                <button id="review-btn" class="btn btn--warning btn--sm"
                        style="height:36px;padding:0 20px;font-size:13.5px">
                    Save Review &amp; Score
                </button>
            </div>
        </div>

        <!-- Read-only reviewed section (shown when already reviewed or view mode) -->
        <div class="adm-card" id="reviewed-section" style="display:none">
            <div class="adm-card-hd">
                <span class="adm-card-title">Saved Review</span>
                <span id="reviewed-score" class="band-display"></span>
            </div>
            <div style="padding:20px">
                <div class="input-label" style="margin-bottom:6px">Feedback</div>
                <textarea id="feedback-readonly" class="input"
                          readonly style="min-height:120px;opacity:.75;cursor:default;resize:none"
                          placeholder="No feedback recorded yet."></textarea>
            </div>
        </div>

    </div><!-- /adm-content -->
</div><!-- /admin-main -->

<div id="toast-container"></div>
<script type="module" src="/js/pages/teacher/review.js"></script>
</body>
</html>
