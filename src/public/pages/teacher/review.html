<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Task</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
</head>
<body>
    <div id="navbar"></div>
    <main class="review-layout">

        <header class="admin-header">
            <a href="/pages/teacher/dashboard.html" class="back-link">Dashboard</a>
            <h1 class="admin-header__title">Review Task</h1>
            <div id="task-status"></div>
        </header>

        <!-- Task info -->
        <div class="review-card">
            <div class="review-card__header">
                <h2 class="review-card__title" id="task-title">Loading…</h2>
                <span id="task-type" style="font-family:var(--font-mono);font-size:12px;color:var(--text3)"></span>
            </div>
            <div class="review-card__body">
                <div class="review-meta" style="display:flex;flex-wrap:wrap;gap:18px;padding:12px 0 16px;border-bottom:1px solid var(--border);margin-bottom:16px;font-size:13px;color:var(--text2)">
                    <span><strong>Student:</strong> <span id="task-student">—</span></span>
                    <span><strong>Word Count:</strong> <span id="task-wordcount">—</span></span>
                    <span><strong>Due:</strong> <span id="task-duedate">—</span></span>
                </div>

                <p class="review-section-title">Question Prompt</p>
                <div class="review-prose" id="task-prompt" style="margin-bottom:20px;max-height:160px">—</div>

                <p class="review-section-title">Student Submission</p>
                <div class="review-prose" id="task-submission">—</div>
            </div>
        </div>

        <!-- Review section — teacher provides feedback + band score -->
        <div class="review-card" id="review-section">
            <div class="review-card__header">
                <h2 class="review-card__title">Feedback &amp; Score</h2>
                <span style="font-family:var(--font-mono);font-size:11px;color:var(--text3)">
                    IELTS band 0–9
                </span>
            </div>
            <div class="review-card__body">
                <div class="form-group" style="margin-bottom:16px">
                    <label class="form-label">Your Feedback</label>
                    <textarea id="feedback-input" class="textarea"
                        placeholder="Write detailed feedback for the student…"></textarea>
                </div>
                <div class="form-group" style="margin-bottom:20px">
                    <label class="form-label">Band Score (0–9)</label>
                    <input id="band-score-input" class="input" type="number"
                        min="0" max="9" step="0.5"
                        placeholder="e.g. 6.5"
                        style="width:140px" />
                </div>
                <button id="review-btn" class="btn btn--warning">Save Review &amp; Score</button>
            </div>
        </div>

        <!-- Reviewed notice (shown when already reviewed) -->
        <div class="review-card" id="reviewed-section" style="display:none">
            <div class="review-card__body" style="display:flex;align-items:center;gap:12px">
                <span class="badge badge--info">REVIEWED</span>
                <span style="font-size:13px;color:var(--text2)">
                    This task has been reviewed. An admin will assign the band score.
                </span>
            </div>
        </div>

    </main>
    <div id="toast-container"></div>
    <script type="module" src="/js/pages/teacher/review.js"></script>
</body>
</html>
