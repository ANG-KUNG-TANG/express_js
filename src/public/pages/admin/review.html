<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Queue — WriteSystem</title>
    <script src="/js/core/theme.js"></script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
</head>

<body class="admin-layout">

    <div id="admin-sidebar"></div>

    <main class="admin-main">
        <header class="page-header">
            <div>
                <h1 class="page-title">Review Queue</h1>
                <p class="page-subtitle">
                    Submitted tasks waiting for review
                    <span id="queue-count" class="badge badge--warning" style="margin-left:.5rem">…</span>
                </p>
            </div>
        </header>

        <!-- Loading -->
        <p id="queue-loading" class="text-muted" style="display:none">Loading…</p>

        <!-- Empty state -->
        <div id="queue-empty" class="empty-state" style="display:none">
            <p>🎉 No tasks pending review.</p>
        </div>

        <!-- Queue table -->
        <div class="card" style="overflow-x:auto">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>Type</th>
                        <th>Student</th>
                        <th>Word Count</th>
                        <th>Submitted</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="queue-tbody"></tbody>
            </table>
        </div>
    </main>

    <!-- Toast -->
    <div id="toast" class="toast" role="alert">
        <span class="t-icon"></span>
        <span id="toast-msg"></span>
    </div>

    <script type="module" src="/js/pages/admin/review_queue.js"></script>

</body>
</html>
