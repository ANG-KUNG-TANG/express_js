<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Task — WriteSystem Admin</title>
    <script src="/js/core/theme.js"></script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
</head>
<body>
<!--
  Sidebar is injected here by initAdminSidebar().
  Do NOT add a hardcoded <aside>.
-->

<div class="admin-main">

    <!-- Topbar -->
    <header class="adm-topbar">
        <div style="display:flex;align-items:center;gap:12px">
            <a href="/pages/admin/tasks.html"
               style="display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text3);
                      text-decoration:none;transition:color .15s"
               onmouseover="this.style.color='var(--text)'" onmouseout="this.style.color='var(--text3)'">
                ← Tasks
            </a>
            <span style="color:var(--border-hi)">/</span>
            <div>
                <div class="adm-topbar-title">Review Task</div>
                <div class="adm-topbar-crumb">Admin <span>›</span> <span>Content</span></div>
            </div>
        </div>
        <div class="adm-search">
            <span class="adm-search-icon">⌕</span>
            <input type="text" placeholder="Search users, tasks…" autocomplete="off" />
        </div>
        <div class="adm-topbar-actions">
            <button class="adm-icon-btn" title="Send notification"
                    onclick="window.location='/pages/admin/notifications.html'">◬</button>
            <button class="adm-icon-btn" title="Alerts">◉<span class="dot"></span></button>
        </div>
    </header>

    <div class="adm-content">

        <!-- Sub-header context -->
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:20px">
            <div style="font-size:12px;color:var(--text3);font-family:var(--font-mono,monospace);letter-spacing:.04em">
                Submit feedback, then assign a band score
            </div>
            <span style="margin-left:auto;border-color:var(--red);color:var(--red);background:var(--red-dim);
                         font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 8px;
                         border-radius:20px;border:1px solid var(--red)">ADMIN</span>
        </div>

        <!-- Task details card -->
        <div class="adm-card">
            <div class="adm-card-hd">
                <div style="flex:1;min-width:0">
                    <div class="adm-card-title" id="task-title">Loading…</div>
                    <div style="font-size:11px;color:var(--text3);font-family:var(--font-mono,monospace);margin-top:2px" id="task-type"></div>
                </div>
                <div style="display:flex;gap:10px;align-items:center">
                    <span id="task-status"></span>
                    <span id="task-wordcount" style="font-size:12px;color:var(--text3);font-family:var(--font-mono,monospace)"></span>
                </div>
            </div>

            <div style="padding:20px">
                <!-- Prompt -->
                <div style="margin-bottom:16px">
                    <div class="input-label" style="margin-bottom:6px">Prompt</div>
                    <div id="task-prompt"
                         style="background:var(--surface2);border:1px solid var(--border-hi);
                                border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.7;
                                color:var(--text2);white-space:pre-wrap;min-height:48px"></div>
                </div>

                <!-- Submission -->
                <div style="margin-bottom:24px">
                    <div class="input-label" style="margin-bottom:6px">Submission</div>
                    <div id="task-submission"
                         style="background:var(--surface2);border:1px solid var(--border-hi);
                                border-radius:8px;padding:14px 16px;font-size:13px;line-height:1.8;
                                color:var(--text);max-height:400px;overflow-y:auto;
                                white-space:pre-wrap;min-height:64px"></div>
                </div>

                <!-- Review + Score columns -->
                <div class="adm-row2">

                    <!-- Review section -->
                    <div id="review-section" style="display:none">
                        <div class="form-group">
                            <label class="form-label">Feedback <span style="color:var(--red)">*</span></label>
                            <textarea id="feedback-input" class="input"
                                style="min-height:140px"
                                placeholder="Write detailed feedback for the student…"></textarea>
                        </div>
                        <button id="review-btn" class="btn btn--primary btn--sm">Save Review</button>
                    </div>

                    <!-- Score section -->
                    <div id="score-section" style="display:none">
                        <div class="form-group">
                            <label class="form-label">Band score (0–9)</label>
                            <input id="score-input" type="number" min="0" max="9" step="0.5"
                                   class="input" placeholder="e.g. 6.5" style="width:140px" />
                        </div>
                        <p style="font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.5">
                            Save your review first, then assign a band score. Scores are final once submitted.
                        </p>
                        <div style="display:flex;align-items:center;gap:12px">
                            <button id="score-btn" class="btn btn--ghost btn--sm">Save Score</button>
                            <span id="final-score"
                                  style="display:none;font-size:20px;font-weight:700;
                                         color:var(--green);font-family:var(--font-mono,monospace)"></span>
                        </div>
                    </div>

                </div>
            </div>
        </div>

    </div><!-- /adm-content -->
</div><!-- /admin-main -->

<div id="toast"><span class="t-icon">✓</span><span id="toast-msg">Done</span></div>
<script type="module" src="/js/pages/admin/review.js"></script>
</body>
</html>
