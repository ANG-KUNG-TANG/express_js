<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Task</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
</head>
<body>
    <div id="navbar"></div>
    <main class="review-layout">

        <header class="admin-header">
            <a href="/pages/admin/tasks.html" class="back-link">All Tasks</a>
            <h1 class="admin-header__title">Review Task</h1>
            <div id="task-status"></div>
        </header>

        <!-- Task info -->
        <div class="review-card">
            <div class="review-card__header">
                <h2 class="review-card__title" id="task-title">Loading…</h2>
                <span id="task-type" style="font-family:var(--font-mono);font-size:12px;color:var(--text3)"></span>
            </div>
            <div class="review-card__body">
                <div class="review-meta">
                    <span class="review-meta__item"><strong>Word Count:</strong> <span id="task-wordcount">—</span></span>
                </div>

                <p class="review-section-title">Question Prompt</p>
                <div class="review-prose" id="task-prompt" style="margin-bottom:20px;max-height:160px">—</div>

                <p class="review-section-title">Student Submission</p>
                <div class="review-prose" id="task-submission">—</div>
            </div>
        </div>

        <!-- Review section -->
        <div class="review-card" id="review-section">
            <div class="review-card__header">
                <h2 class="review-card__title">Feedback</h2>
            </div>
            <div class="review-card__body">
                <div class="form-group" style="margin-bottom:16px">
                    <label class="form-label">Your Feedback</label>
                    <textarea id="feedback-input" class="textarea"
                        placeholder="Write detailed feedback for the student…"></textarea>
                </div>
                <button id="review-btn" class="btn btn--warning">Save Review</button>
            </div>
        </div>

        <!-- Score section -->
        <div class="review-card" id="score-section">
            <div class="review-card__header">
                <h2 class="review-card__title">Band Score</h2>
            </div>
            <div class="review-card__body">
                <div id="final-score" class="band-score-display" style="display:none;margin-bottom:16px">
                    Band —
                </div>
                <div style="display:flex;gap:12px;align-items:flex-end">
                    <div class="form-group">
                        <label class="form-label">Score (0–9)</label>
                        <input id="score-input" type="number" class="input"
                            min="0" max="9" step="0.5" style="width:120px"
                            placeholder="e.g. 6.5" />
                    </div>
                    <button id="score-btn" class="btn btn--primary">Save Score</button>
                </div>
            </div>
        </div>

    </main>
    <div id="toast-container"></div>
    <script type="module" src="/js/pages/admin/review.js"></script>
</body>
</html>
