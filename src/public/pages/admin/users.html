<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>User Management — WriteSystem Admin</title>
    <script src="/js/core/theme.js"></script>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
</head>
<body>
<!--
  Sidebar injected as first child of <body> by initAdminSidebar().
  Do NOT add a hardcoded <aside>.
-->

<div class="admin-main">

    <header class="adm-topbar">
        <div>
            <div class="adm-topbar-title">User Management</div>
            <div class="adm-topbar-crumb">Admin <span>›</span> <span>People</span></div>
        </div>
        <div class="adm-search">
            <span class="adm-search-icon">⌕</span>
            <input type="text" placeholder="Search users, tasks…" autocomplete="off" />
        </div>
        <div class="adm-topbar-actions">
            <button class="adm-icon-btn" title="Notifications"
                    onclick="window.location='/pages/admin/notifications.html'">◬</button>
            <button class="adm-icon-btn" title="Alerts">◉<span class="dot"></span></button>
        </div>
    </header>

    <div class="adm-content">

        <!-- Search -->
        <div class="adm-card" style="margin-bottom:20px">
            <div class="adm-card-hd">
                <span class="adm-card-title">Search by email</span>
                <span class="badge-admin">ADMIN</span>
            </div>
            <div style="padding:16px 20px">
                <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
                    <input id="search-email" type="email" class="input input--sm"
                           placeholder="user@example.com" style="width:280px" />
                    <button id="search-btn"       class="btn btn--primary btn--sm">Search</button>
                    <button id="clear-search-btn" class="btn btn--ghost   btn--sm">Clear</button>
                </div>
            </div>
        </div>

        <!-- Users table -->
        <div class="adm-card">
            <div class="adm-card-hd">
                <span class="adm-card-title">All users</span>
                <span style="font-size:11px;color:var(--text3);font-family:var(--font-mono,monospace)">
                    Promote, link, and manage all users
                </span>
            </div>
            <div id="users-list">
                <p class="loading" style="text-align:center;padding:40px">Loading…</p>
            </div>
        </div>

    </div><!-- /adm-content -->
</div><!-- /admin-main -->

<div id="toast"><span class="t-icon">✓</span><span id="toast-msg">Done</span></div>
<script type="module" src="/js/pages/admin/users.js"></script>
</body>
</html>
