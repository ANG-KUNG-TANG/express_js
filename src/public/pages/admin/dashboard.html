<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
</head>
<body>
    <div id="navbar"></div>
    <main class="admin-layout">

        <header class="admin-header">
            <h1 class="admin-header__title">Dashboard</h1>
            <span class="admin-header__sub">Platform overview</span>
            <span class="admin-header__badge">ADMIN</span>
        </header>

        <!-- Panel 1: Stats Bar -->
        <section class="stats-bar">
            <div class="stat-card" id="stat-total-users">
                <span class="stat-card__value">—</span>
                <span class="stat-card__label">Total Users</span>
            </div>
            <div class="stat-card stat-card--highlight" id="stat-new-users">
                <span class="stat-card__value">—</span>
                <span class="stat-card__label">New This Week</span>
            </div>
            <div class="stat-card" id="stat-teachers">
                <span class="stat-card__value">—</span>
                <span class="stat-card__label">Teachers</span>
            </div>
            <div class="stat-card stat-card--warning" id="stat-pending">
                <span class="stat-card__value">—</span>
                <span class="stat-card__label">Pending Review</span>
            </div>
        </section>

        <!-- Panel 2: Pending Work Queue -->
        <section class="admin-panel">
            <div class="admin-panel__header">
                <div>
                    <h2 class="admin-panel__title">⚠ Pending Review</h2>
                    <span class="admin-panel__sub">Oldest first — needs attention</span>
                </div>
            </div>
            <div id="pending-list"><p class="loading">Loading…</p></div>
        </section>

        <!-- Panel 3: Recent Activity -->
        <section class="admin-panel">
            <div class="admin-panel__header">
                <div>
                    <h2 class="admin-panel__title">Recent Activity</h2>
                    <span class="admin-panel__sub">Last 10 task updates</span>
                </div>
            </div>
            <div id="activity-list"><p class="loading">Loading…</p></div>
        </section>

        <!-- Panel 4: User Management -->
        <section class="admin-panel">
            <div class="admin-panel__header">
                <h2 class="admin-panel__title">User Management</h2>
                <div class="admin-panel__controls">
                    <input id="search-email" type="text" class="input input--sm"
                        placeholder="Search by email…" style="width:220px" />
                    <button id="search-btn"       class="btn btn--secondary btn--sm">Search</button>
                    <button id="clear-search-btn" class="btn btn--ghost btn--sm">Clear</button>
                </div>
            </div>
            <div id="users-list"><p class="loading">Loading…</p></div>
        </section>

        <!-- Panel 5: Task Management -->
        <section class="admin-panel">
            <div class="admin-panel__header">
                <h2 class="admin-panel__title">Task Management</h2>
                <div class="admin-panel__controls">
                    <input id="task-search" type="text" class="input input--sm"
                        placeholder="Search by title…" style="width:200px" />
                    <select id="task-status-filter" class="select select--sm" style="width:150px">
                        <option value="">All Statuses</option>
                        <option value="DRAFT">Draft</option>
                        <option value="SUBMITTED">Submitted</option>
                        <option value="REVIEWED">Reviewed</option>
                        <option value="SCORED">Scored</option>
                    </select>
                </div>
            </div>
            <div id="tasks-list"><p class="loading">Loading…</p></div>
        </section>

    </main>
    <div id="toast-container"></div>
    <script type="module" src="/js/pages/admin/dashboard.js"></script>
</body>
</html>
