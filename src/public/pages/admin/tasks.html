<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Tasks — Admin</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/pages/admin.css" />
</head>
<body class="page">
  <div class="container page-content">

    <div class="page-header">
      <p class="page-header__eyebrow">Administration</p>
      <h1 class="page-header__title">All Tasks</h1>
    </div>

    <div class="admin-nav">
      <a href="/pages/admin/dashboard.html" class="btn btn--ghost">Overview</a>
      <a href="/pages/admin/tasks.html"     class="btn btn--secondary">All Tasks</a>
      <a href="/pages/admin/users.html"     class="btn btn--ghost">Manage Users</a>
    </div>

    <!-- Transfer tool -->
    <div class="transfer-card">
      <h3>Transfer Tasks</h3>
      <div class="transfer-row">
        <div class="form-group">
          <label>From User ID</label>
          <input type="text" id="transfer-from" placeholder="Source user ID" />
        </div>
        <div class="form-group">
          <label>To User ID</label>
          <input type="text" id="transfer-to" placeholder="Target user ID" />
        </div>
        <button id="transfer-btn" class="btn btn--warning">Transfer All Tasks</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="filter-bar">
      <input type="text" id="search-input" placeholder="Search tasks…" style="flex:1;" />
      <select id="filter-status">
        <option value="">All Statuses</option>
        <option value="ASSIGNED">Assigned</option>
        <option value="WRITING">Writing</option>
        <option value="SUBMITTED">Submitted</option>
        <option value="REVIEWED">Reviewed</option>
        <option value="SCORED">Scored</option>
      </select>
    </div>

    <div id="tasks-list"><p class="loading">Loading…</p></div>

  </div>
  <script type="module" src="/js/pages/admin/tasks.js"></script>
</body>
</html>
