<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Management</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/pages/admin.css" />
</head>
<body>
    <div id="navbar"></div>
    <main class="admin-layout">

        <header class="admin-header">
            <a href="/pages/admin/dashboard.html" class="back-link">Dashboard</a>
            <h1 class="admin-header__title">Task Management</h1>
            <span class="admin-header__badge">ADMIN</span>
        </header>

        <section class="admin-panel">
            <div class="admin-panel__header">
                <h2 class="admin-panel__title">All Tasks</h2>
                <div class="admin-panel__controls">
                    <input id="search-input" type="text" class="input input--sm"
                        placeholder="Search by title…" style="width:200px" />
                    <select id="filter-status" class="select select--sm" style="width:150px">
                        <option value="">All Statuses</option>
                        <option value="DRAFT">Draft</option>
                        <option value="SUBMITTED">Submitted</option>
                        <option value="REVIEWED">Reviewed</option>
                        <option value="SCORED">Scored</option>
                    </select>
                </div>
            </div>
            <div id="tasks-list"><p class="loading">Loading…</p></div>
        </section>

        <!-- Transfer panel -->
        <section class="admin-panel">
            <div class="admin-panel__header">
                <h2 class="admin-panel__title">Transfer Tasks</h2>
                <span class="admin-panel__sub">Move all tasks from one user to another</span>
            </div>
            <div class="admin-panel__body">
                <div style="display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end">
                    <div class="form-group" style="flex:1;min-width:160px">
                        <label class="form-label">From User ID</label>
                        <input id="transfer-from" type="text" class="input input--sm" placeholder="user ObjectId" />
                    </div>
                    <div class="form-group" style="flex:1;min-width:160px">
                        <label class="form-label">To User ID</label>
                        <input id="transfer-to" type="text" class="input input--sm" placeholder="user ObjectId" />
                    </div>
                    <button id="transfer-btn" class="btn btn--warning btn--sm">Transfer All</button>
                </div>
            </div>
        </section>

    </main>
    <div id="toast-container"></div>
    <script type="module" src="/js/pages/admin/tasks.js"></script>
</body>
</html>
